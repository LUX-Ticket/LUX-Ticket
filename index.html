<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LUX Ticket</title>
  <link rel="icon" type="image/png" href="favicon.png">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #FFF5F2;
  }
  #loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFF5F2;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    color: #4A3A3D;
    font-size: 16px;
    transition: opacity 0.3s ease;
    z-index: 2;
  }
  #loading.hide {
    opacity: 0;
    pointer-events: none;
  }
  iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    z-index: 1;
  }
</style>
</head>
<body>
  <div id="loading">กำลังโหลด LUX Ticket...</div>
  <iframe
    src="https://script.google.com/macros/s/AKfycbwfHAFX6OGZ4IBGVfWFUlCvsE9UBHNW2aL8DOaC7FOp5bvwQuJGD4NNBjd8HFEPmaVbrg/exec"
    onload="document.getElementById('loading').classList.add('hide')"
    allow="clipboard-write"
  ></iframe>
</body>
</html>
